<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="./script.js" defer></script>
  <title>Banking</title>
</head>
<body>
  <div class="content">
    <div class="header"><h1>Title</h1></div>
    <div class="container">
      <div class="left-side">
        <h2>Search</h2>
        <div class="toggle-container">
          <input type="radio" id="searchBut" name="mode" value="search" checked>
          <label for="searchBut">Search</label>
          <input type="radio" id="newBut" name="mode" value="newBut">
          <label for="newBut">New Entry</label>
          <input type="radio" id="editBut" name="mode" value="editBut">
          <label for="editBut">Edit</label>
        </div>
        <div class="title-container">
          <label>Title</label>
          <input type="text" id="title-search">
        </div>
        <div class="acc-type-container">
          <label>Type</label>
          <select name="acc-select" id="acc-select">
            <option value="-" selected>-</option>
          </select>
        </div>
        <div class="min-max-container">
          <div class="min-container">
            <label>Min</label>
            <input type="number" id="min-search">
          </div>
          <div class="max-container">
            <label>Max</label>
            <input type="number" id="max-search">
          </div>
        </div>
        <div class="date-container">
          <div class="date-from-container">
            <label>From</label>
            <input type="date" id="date-from">
          </div>
          <div class="date-to-container">
            <label>To</label>
            <input type="date" id="date-to">
          </div>
        </div>
        <div class="desc-container">
          <input type="text" id="desc-search" placeholder="Description...">
        </div>
        <button class="actionBut">Search</button>
      </div>
      <div class="rigth-side">
        <h2>Entries</h2>
        <table class="dataTable">
          <tr>
            <th>Date</th>
            <th>Amount</th>
            <th>Title</th>
            <th>Type</th>
            <th>Description</th>
          </tr>
        </table>
      </div>
    </div>
    <div class="footer"><input type="file" id="file-input" /></div>
  </div>
</body>
</html>
